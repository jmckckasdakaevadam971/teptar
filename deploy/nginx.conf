# ============================================================================
#  Reverse proxy для Тептара. Это ШАБЛОН: nginx подставит ${DOMAIN}
#  из переменной окружения при старте (механизм /etc/nginx/templates).
#  Один вход → frontend (Next.js) и backend (Express), HTTPS + кэш.
# ============================================================================

# Кэш публичных GET-ответов API (справочники, списки). Хранится на диске.
# inactive=10m: устаревшие записи живут дольше срока валидности — из них
# отдаются мгновенные stale-ответы, пока фоново тянется свежий.
proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:10m
                 max_size=200m inactive=10m use_temp_path=off;

# DNS-резолвер Docker — нужен для динамической балансировки между репликами
# backend/frontend (адреса перерезолвиваются без перезапуска nginx).
resolver 127.0.0.11 valid=10s ipv6=off;
resolver_timeout 3s;

# Постоянные соединения к репликам (нет TCP/TLS-рукопожатия на каждый запрос).
# `resolve` перечитывает DNS при пересоздании контейнеров (nginx ≥ 1.27.3).
upstream frontend_up {
    zone frontend_up 64k;
    server frontend:3000 resolve;
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

upstream backend_up {
    zone backend_up 64k;
    server backend:4000 resolve;
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

# WebSocket-совместимость: заголовок Connection ставится только при апгрейде,
# иначе пустой — что и позволяет keepalive до upstream.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      "";
}

# Сжатие ответов (HTML, JSON API, SVG, скрипты). Работает и для
# проксированных ответов от Next/Express (gzip_proxied any).
gzip on;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_proxied any;
gzip_vary on;
gzip_types
    text/plain
    text/css
    application/json
    application/javascript
    application/xml
    image/svg+xml;

# --- HTTP :80 — ACME-проверка Let's Encrypt + редирект на HTTPS ---
server {
    listen 80;
    server_name ${DOMAIN} www.${DOMAIN};

    # Webroot для выпуска/обновления сертификата.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # Всё остальное — на HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS :443 (HTTP/2 + HTTP/3) ---
server {
    listen 443 ssl;
    listen 443 quic reuseport;
    http2 on;
    server_name ${DOMAIN} www.${DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Много запросов в одном клиентском соединении.
    keepalive_requests 10000;

    # Повторные визиты идут сразу по HTTPS без редиректа с :80.
    add_header Strict-Transport-Security "max-age=31536000" always;
    # Браузеру: доступен HTTP/3 по QUIC (меньше RTT, лучше на мобильных сетях).
    add_header Alt-Svc 'h3=":443"; ma=86400' always;

    # Размер тела запроса (на вырост, для будущей загрузки файлов).
    client_max_body_size 10m;

    # Быстрое обнаружение проблем с репликой и переход к следующей.
    proxy_connect_timeout 3s;
    proxy_next_upstream   error timeout http_502 http_503;
    proxy_socket_keepalive on;

    # www → на основной домен (канонический адрес).
    if ($host = www.${DOMAIN}) {
        return 301 https://${DOMAIN}$request_uri;
    }

    # Статика Next.js иммутабельна (хэш в имени) — кэшируем максимально.
    location /_next/static/ {
        proxy_pass http://frontend_up;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Alt-Svc 'h3=":443"; ma=86400' always;
    }

    # Картинки из public/ меняются редко — кэш на 30 дней.
    location /images/ {
        proxy_pass http://frontend_up;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        # Next для public/ шлёт max-age=0 — прячем, чтобы не было двух заголовков.
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=2592000";
        add_header Alt-Svc 'h3=":443"; ma=86400' always;
    }

    # API → backend (реплики). Префикс /api сохраняется.
    location /api/ {
        proxy_pass         http://backend_up;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Кэш публичных GET (справочники/списки). Авторизованные запросы
        # (с заголовком Authorization) всегда идут к backend «свежими».
        proxy_cache            api_cache;
        proxy_cache_methods    GET HEAD;
        proxy_cache_key        $scheme$request_method$host$request_uri;
        proxy_cache_bypass     $http_authorization;
        proxy_no_cache         $http_authorization;
        proxy_cache_valid      200 60s;
        # Параллельные промахи схлопываются в один запрос к backend…
        proxy_cache_lock       on;
        proxy_cache_lock_timeout 5s;
        # …а устаревший ответ отдаётся мгновенно, обновление — в фоне.
        proxy_cache_use_stale  error timeout updating;
        proxy_cache_background_update on;
        add_header             X-Cache-Status $upstream_cache_status always;
        add_header             Alt-Svc 'h3=":443"; ma=86400' always;
    }

    # Всё остальное → frontend (Next.js, реплики).
    location / {
        proxy_pass         http://frontend_up;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
