<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 180" width="500" height="180">
  <defs>
    <linearGradient id="trunkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5D4037"/>
      <stop offset="100%" stop-color="#3E2723"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#388E3C"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
  </defs>

  <!-- Эмблема: круглая рамка -->
  <circle cx="90" cy="90" r="78" fill="#1B5E20"/>
  <circle cx="90" cy="90" r="73" fill="#FFF8E1"/>
  <circle cx="90" cy="90" r="73" fill="none" stroke="#C9A227" stroke-width="2"/>
  <circle cx="90" cy="90" r="68" fill="none" stroke="#C9A227" stroke-width="0.5"/>

  <!-- Корни (предки) -->
  <g stroke="#3E2723" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M90,142 Q72,150 52,156"/>
    <path d="M90,142 Q90,154 90,162"/>
    <path d="M90,142 Q108,150 128,156"/>
    <path d="M90,142 Q60,148 40,148"/>
    <path d="M90,142 Q120,148 140,148"/>
  </g>

  <!-- Ствол -->
  <path d="M85,142 L85,85 Q85,80 90,80 Q95,80 95,85 L95,142 Z" fill="url(#trunkGrad)"/>

  <!-- 7 ветвей (поколений) -->
  <g stroke="#1B5E20" stroke-width="2.8" stroke-linecap="round" fill="none">
    <path d="M90,88 Q70,78 52,62"/>
    <path d="M90,88 Q110,78 128,62"/>
    <path d="M90,82 Q66,68 48,46"/>
    <path d="M90,82 Q114,68 132,46"/>
    <path d="M90,76 Q76,58 68,36"/>
    <path d="M90,76 Q104,58 112,36"/>
    <path d="M90,70 L90,28"/>
  </g>

  <!-- 7 листьев -->
  <g fill="url(#leafGrad)">
    <ellipse cx="52" cy="62" rx="7" ry="9" transform="rotate(-40 52 62)"/>
    <ellipse cx="128" cy="62" rx="7" ry="9" transform="rotate(40 128 62)"/>
    <ellipse cx="48" cy="46" rx="7" ry="9" transform="rotate(-50 48 46)"/>
    <ellipse cx="132" cy="46" rx="7" ry="9" transform="rotate(50 132 46)"/>
    <ellipse cx="68" cy="36" rx="7" ry="9" transform="rotate(-20 68 36)"/>
    <ellipse cx="112" cy="36" rx="7" ry="9" transform="rotate(20 112 36)"/>
  </g>
  <circle cx="90" cy="28" r="8" fill="#C9A227"/>
  <circle cx="90" cy="28" r="4" fill="#FFF8E1"/>

  <!-- Текст -->
  <text x="195" y="78" font-family="Georgia, 'Times New Roman', serif" font-size="50" font-weight="bold" fill="#1B5E20" letter-spacing="2">Vorhda</text>
  <text x="197" y="105" font-family="Georgia, serif" font-size="17" fill="#C9A227" font-weight="bold" letter-spacing="4">ВОРХ ДА · СЕМЬ ОТЦОВ</text>
  <text x="197" y="130" font-family="Arial, sans-serif" font-size="11" fill="#3E2723" letter-spacing="1.5">РОДОВАЯ ПАМЯТЬ ЧЕЧЕНСКИХ ТЕЙПОВ</text>
  <text x="197" y="148" font-family="Arial, sans-serif" font-size="9" fill="#5D4037" letter-spacing="2" font-style="italic">vorhda.com</text>
</svg>
