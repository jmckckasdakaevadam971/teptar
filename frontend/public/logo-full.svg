<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 180" width="500" height="180">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FBEFC6"/>
    </linearGradient>
    <linearGradient id="mtnFront" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
    <linearGradient id="trunkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5D4037"/>
      <stop offset="100%" stop-color="#3E2723"/>
    </linearGradient>
    <clipPath id="emblemClip"><circle cx="90" cy="90" r="73"/></clipPath>
  </defs>

  <!-- Эмблема: круглая рамка + небо -->
  <circle cx="90" cy="90" r="78" fill="#1B5E20"/>
  <circle cx="90" cy="90" r="73" fill="url(#skyGrad)"/>

  <!-- Горы внутри круга -->
  <g clip-path="url(#emblemClip)">
    <!-- дальние горы -->
    <path d="M17,138 L38,114 L60,128 L82,108 L104,126 L128,110 L150,126 L163,132 L163,163 L17,163 Z" fill="#A5D6A7"/>
    <!-- снежные шапки дальних пиков -->
    <path d="M76,116 L82,108 L88,116 L83,114 L80,115 Z" fill="#FFF8E1"/>
    <path d="M122,118 L128,110 L134,118 L129,116 L125,117 Z" fill="#FFF8E1"/>
    <!-- средние горы -->
    <path d="M17,150 L44,120 L68,136 L90,114 L112,136 L136,120 L163,148 L163,163 L17,163 Z" fill="#388E3C"/>
    <!-- передние горы -->
    <path d="M17,163 L17,156 L52,134 L74,148 L96,130 L118,148 L140,134 L163,156 L163,163 Z" fill="url(#mtnFront)"/>
  </g>

  <!-- Древо рода растёт из центральной вершины (исток) -->
  <path d="M86,138 L86,104 Q86,100 90,100 Q94,100 94,104 L94,138 Z" fill="url(#trunkGrad)"/>
  <g stroke="#1B5E20" stroke-width="2.8" stroke-linecap="round" fill="none">
    <path d="M90,108 Q70,98 56,84"/>
    <path d="M90,108 Q110,98 124,84"/>
    <path d="M90,102 Q66,90 52,70"/>
    <path d="M90,102 Q114,90 128,70"/>
    <path d="M90,96 Q76,78 70,56"/>
    <path d="M90,96 Q104,78 110,56"/>
    <path d="M90,92 L90,50"/>
  </g>

  <!-- 7 золотых плодов = семь отцов -->
  <g fill="#C9A227">
    <circle cx="56" cy="84" r="5.5"/>
    <circle cx="124" cy="84" r="5.5"/>
    <circle cx="52" cy="70" r="5.5"/>
    <circle cx="128" cy="70" r="5.5"/>
    <circle cx="70" cy="56" r="5.5"/>
    <circle cx="110" cy="56" r="5.5"/>
    <circle cx="90" cy="50" r="6.5"/>
  </g>
  <circle cx="90" cy="50" r="3" fill="#FFF8E1"/>

  <!-- золотая обводка -->
  <circle cx="90" cy="90" r="73" fill="none" stroke="#C9A227" stroke-width="2"/>
  <circle cx="90" cy="90" r="68" fill="none" stroke="#C9A227" stroke-width="0.5"/>

  <!-- Текст -->
  <text x="195" y="78" font-family="Georgia, 'Times New Roman', serif" font-size="50" font-weight="bold" fill="#1B5E20" letter-spacing="2">Vorhda</text>
  <text x="197" y="105" font-family="Georgia, serif" font-size="17" fill="#C9A227" font-weight="bold" letter-spacing="4">ВОРХ ДА · СЕМЬ ОТЦОВ</text>
  <text x="197" y="130" font-family="Arial, sans-serif" font-size="11" fill="#3E2723" letter-spacing="1.5">РОДОВАЯ ПАМЯТЬ ЧЕЧЕНСКИХ ТЕЙПОВ</text>
  <text x="197" y="148" font-family="Arial, sans-serif" font-size="9" fill="#5D4037" letter-spacing="2" font-style="italic">vorhda.ru</text>
</svg>
